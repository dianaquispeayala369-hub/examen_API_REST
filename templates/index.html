<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row text-center mb-4">
            <div class="col">
                <h1 class="display-6 fw-bold text-primary">Gestión de Estudiantes</h1>
                <p class="text-muted">Examen API REST - Desarrollo Backend</p>
                <hr>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Estudiantes</h5>
                        <button hx-get="/students/table" hx-target="#tabla-container" class="btn btn-sm btn-primary">
                            🔄 Actualizar Vista
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div id="tabla-container" hx-get="/students/table" hx-trigger="load">
                            <div class="text-center py-4">
                                <div class="spinner-border text-secondary" role="status"></div>
                                <p class="mt-2 text-muted">Solicitando datos...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
