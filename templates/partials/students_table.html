<table class="table table-striped table-bordered mb-0"> 
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>DNI</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Nota</th>
            <th>¿Aprobado?</th>
        </tr>
    </thead>
    <tbody>
        {% for student in student_list %}
        <tr>
            <td>{{ student["id"] }}</td>
            <td>{{ student["dni"] }}</td>
            <td>{{ student["name"] }}</td>
            <td>{{ student["age"] }}</td>
            <td>{{ student["grade"] }}</td>
            <td>
                {% if student["is_approved"] %}
                    <span class="badge bg-success">Sí</span>
                {% else %}
                    <span class="badge bg-danger">No</span>
                {% endif %}
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="6" class="text-center text-muted py-3">No hay estudiantes registrados aún.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
